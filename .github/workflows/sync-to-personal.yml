name: Sync to personal repository

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sorgente
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # serve per avere tutta la storia
          persist-credentials: false

      - name: Test autenticazione PAT
        run: |
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.TARGET_PAT }}" \
            https://api.github.com/repos/theflaviomercuri/agente-verbalizzante

      - name: Push al repo destinazione
        run: |
          git remote add target https://x-access-token:${{ secrets.TARGET_PAT }}@github.com/theflaviomercuri/agente-verbalizzante.git
          git push target main --force
